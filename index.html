<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DZ Coaching — UI Kit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { gold:'#d4a843','gold-light':'#e8c96a','gold-dark':'#b8922e', dark:'#0a0a0a','dark-card':'#141414','dark-border':'#262626' },
    fontFamily: { heading:['Unbounded','sans-serif'], body:['Manrope','sans-serif'] }
  }}};
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Unbounded:wght@200..700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body{font-family:'Manrope',sans-serif;background:#0a0a0a;color:#fff;margin:0}
  .font-heading{font-family:'Unbounded',sans-serif}
  .dz-ghost-btn{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.3);color:#fff;text-transform:uppercase;letter-spacing:.16em;font-weight:500;transition:all .3s ease}
  .dz-ghost-btn:hover{border-color:rgba(212,168,67,.5)}
  .dz-sheen{background-size:200% 100%;animation:sheen 6s linear infinite}
  @keyframes sheen{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  .dz-float{animation:float 5s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .dz-hero-glow{animation:glow 4.5s ease-in-out infinite}
  @keyframes glow{0%,100%{opacity:.45;transform:scale(.98)}50%{opacity:.8;transform:scale(1.03)}}
  .card-hover{transition:transform .3s ease,box-shadow .3s ease}
  .card-hover:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(212,168,67,.15)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Achievements.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
  const App = () => (
    <>
      <Navbar/>
      <Hero/>
      <Achievements/>
      <About/>
      <Testimonials/>
      <Gallery/>
      <Services/>
      <HowItWorks/>
      <Quote/>
      <Contacts/>
      <Footer/>
    </>
  );
  ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
